<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UC Study Tutor</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0e1015; color: #e8e8ec; height: 100vh; display: flex; flex-direction: column; overflow: hidden; font-size: 14px; line-height: 1.55; }
nav { display: flex; align-items: center; gap: 4px; padding: 12px 20px; border-bottom: 1px solid #232634; background: #14161e; flex-shrink: 0; }
nav .logo { font-size: 14px; font-weight: 600; color: #fff; margin-right: 16px; letter-spacing: 0.3px; }
nav button { background: transparent; border: none; color: #999; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; }
nav button:hover { background: #1d2030; color: #ccc; }
nav button.active { background: #2a2d3e; color: #fff; }
nav .spacer { flex: 1; }
.settings-btn { font-size: 12px !important; padding: 6px 12px !important; border: 1px solid #2a2d3e !important; }
.tab-content { flex: 1; overflow: hidden; display: none; flex-direction: column; }
.tab-content.active { display: flex; }

/* Session selector panel */
.session-panel { background: #11131b; border-bottom: 1px solid #232634; padding: 12px 20px; display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.session-col { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
.session-col-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #666; margin-bottom: 2px; }
.session-btn { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 7px; border: 1px solid #2a2d3e; background: #181b27; cursor: pointer; font-size: 12px; color: #999; font-family: inherit; text-align: left; transition: all 0.12s; }
.session-btn:hover { border-color: #4a4d65; color: #ccc; }
.session-btn.selected { border-color: var(--course-color); color: #fff; background: #1e2235; }
.session-btn .sb-check { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid #3a3d52; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
.session-btn.selected .sb-check { background: var(--course-color); border-color: var(--course-color); color: #fff; }
.session-btn .sb-count { margin-left: auto; font-size: 10px; color: #555; }
.session-btn.selected .sb-count { color: #888; }
.session-actions { display: flex; flex-direction: column; gap: 6px; justify-content: flex-end; align-self: flex-end; padding-bottom: 2px; }
.load-btn { background: var(--course-color); border: none; border-radius: 7px; padding: 7px 16px; font-size: 12px; font-weight: 600; color: #fff; cursor: pointer; font-family: inherit; white-space: nowrap; opacity: 0.9; }
.load-btn:hover { opacity: 1; }
.load-btn:disabled { background: #252530; color: #444; cursor: not-allowed; opacity: 1; }
.load-status { font-size: 11px; color: #666; text-align: center; }
.load-status.ok { color: #6ed98a; }
.load-status.err { color: #f87171; }

/* Chat area */
.chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 10px; max-width: 100%; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; max-width: 80%; }
.msg.assistant { align-self: flex-start; max-width: 92%; }
.bubble { padding: 11px 15px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-wrap: break-word; }
.user .bubble { background: #2a2d7a; color: #d8d8ff; border-bottom-right-radius: 4px; }
.assistant .bubble { background: #181b27; border: 1px solid #262a3a; color: #d4d6e0; border-bottom-left-radius: 4px; }
.avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; letter-spacing: 0.3px; }
.user .avatar { background: #3a3db5; color: #c8c8ff; }
.thinking { color: #666; font-style: italic; }
.quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 20px 12px; }
.quick-btn { background: #1c1f2a; border: 1px solid #2e3245; border-radius: 20px; padding: 6px 13px; font-size: 12px; color: #aab; cursor: pointer; font-family: inherit; }
.quick-btn:hover { border-color: #6a6dff; color: #c0c4ff; }
.quick-btn.special { background: #1a2e22; border-color: #2e5d40; color: #6ed98a; }
.input-area { padding: 14px 20px; border-top: 1px solid #232634; background: #11131b; display: flex; gap: 10px; }
.input-area textarea { flex: 1; background: #1c1f2a; border: 1px solid #2e3245; border-radius: 10px; padding: 11px 14px; font-size: 14px; color: #e0e0e8; resize: none; outline: none; font-family: inherit; line-height: 1.5; max-height: 120px; }
.input-area textarea:focus { border-color: #5a5dff; }
.send-btn { background: #3a3db5; border: none; border-radius: 10px; width: 46px; height: 46px; cursor: pointer; color: #c0c0ff; font-size: 18px; align-self: flex-end; flex-shrink: 0; }
.send-btn:hover { background: #4a4dc5; }
.send-btn:disabled { background: #252530; color: #444; cursor: not-allowed; }

/* Course header */
.course-header { padding: 14px 20px; border-bottom: 1px solid #232634; display: flex; align-items: center; gap: 14px; background: #14161e; }
.course-badge { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.3px; flex-shrink: 0; }
.course-header h1 { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 2px; }
.course-header .meta { font-size: 12px; color: #888; }
.course-header .clear { margin-left: auto; background: transparent; border: 1px solid #2e3245; color: #888; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; font-family: inherit; }
.course-header .clear:hover { color: #f87171; border-color: #f87171; }

/* Dashboard */
#tab-dash { padding: 28px 24px; overflow-y: auto; }
.dash-wrap { max-width: 1400px; margin: 0 auto; }
.dash-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; color: #777; margin-bottom: 14px; }
.countdown-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 36px; }
.countdown-card { background: #181b27; border: 1px solid #262a3a; border-left: 3px solid; border-radius: 10px; padding: 16px 18px; position: relative; cursor: pointer; transition: all 0.15s; }
.countdown-card:hover { border-color: #4a4d65; }
.countdown-card.urgent { border-left-color: #f59e0b !important; }
.countdown-card.critical { border-left-color: #ef4444 !important; background: #2a1818; }
.countdown-card .cd-course { font-size: 11px; color: #888; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
.countdown-card .cd-time { font-size: 22px; font-weight: 600; color: #fff; line-height: 1.2; }
.countdown-card.urgent .cd-time { color: #fbbf6b; }
.countdown-card.critical .cd-time { color: #f87171; }
.countdown-card .cd-units { font-size: 11px; color: #888; margin-top: 4px; }
.countdown-card .cd-edit { position: absolute; top: 10px; right: 12px; color: #555; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.countdown-card.passed { opacity: 0.4; }
.dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 16px; }
.course-card { background: #181b27; border: 1px solid #262a3a; border-radius: 12px; padding: 20px; border-left: 3px solid; }
.cc-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.cc-badge { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0; }
.cc-name { font-size: 15px; font-weight: 600; }
.cc-meta { font-size: 11px; color: #888; margin-top: 1px; }
.pass-callout { background: #15291a; border: 1px solid #2a5040; border-radius: 8px; padding: 11px 14px; margin-bottom: 14px; }
.pass-callout .pc-value { font-size: 15px; font-weight: 600; color: #6ed98a; line-height: 1.4; }
.family-message { background: #14261a; border: 1px solid #234d33; border-radius: 10px; padding: 16px 22px; margin-bottom: 32px; display: flex; gap: 32px; flex-wrap: wrap; }
.fm-msg { font-size: 14px; color: #a8dcb8; font-style: italic; line-height: 1.5; }
.fm-msg .fm-from { color: #6da585; font-style: normal; font-weight: 500; margin-left: 8px; }
.grade-table { border-top: 1px solid #232634; padding-top: 4px; }
.grade-row { display: grid; grid-template-columns: 1fr 70px 60px; gap: 10px; align-items: center; padding: 8px 0; font-size: 13px; border-bottom: 1px solid #20232f; }
.grade-row:last-child { border-bottom: none; }
.grade-row input { background: #1c1f2a; border: 1px solid #2e3245; border-radius: 5px; padding: 5px 7px; font-size: 12px; color: #e0e0e8; text-align: right; outline: none; font-family: inherit; width: 100%; }
.grade-row input:focus { border-color: #5a5dff; }
.grade-row input.empty { background: #221915; border-color: #4a3520; }
.grade-row .gr-name { color: #c4c6d0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.grade-row .gr-weight { color: #666; font-size: 11px; text-align: right; }
.note-line { margin-top: 14px; padding: 8px 12px; background: #2a1d0d; border: 1px solid #553817; border-radius: 6px; font-size: 11px; color: #d0a060; line-height: 1.45; }
.current-stats { margin-top: 14px; padding-top: 14px; border-top: 1px solid #232634; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.stat-line { font-size: 11px; }
.stat-line .sl-label { color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.stat-line .sl-value { font-size: 17px; font-weight: 600; color: #fff; }
.higher-targets { margin-top: 14px; padding-top: 12px; border-top: 1px solid #232634; }
.higher-targets .ht-label { font-size: 11px; color: #777; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.target-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
.target-row .tr-name { color: #999; }
.target-row .tr-val { font-weight: 500; }
.target-row .tr-val.easy { color: #6ed98a; }
.target-row .tr-val.medium { color: #4ea872; }
.target-row .tr-val.hard { color: #3d7a4d; }
.target-row .tr-val.impossible { color: #3d7a4d; }
.dash-header-top { margin-bottom: 28px; }
.dash-header-top h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.dash-header-top p { color: #888; font-size: 13px; }
</style>
</head>

    defaultGrades: { mid: '77.33', q1: '44.63', q2: '54.17', q3: '60', q4: '96.43', lab: '50' },
    systemPrompt: `You are a tutor for ENCN415 (Pavement Engineering) at University of Canterbury. The final exam covers BOTH terms — Term 2 builds on Term 1, surface those connections proactively.

Term 1: pavement types/distresses, Superpave characterisation, volumetric properties, Superpave mix design, APRG18, recycling (RAP, HIP, RIP).
Term 2: material characterisation, multilayer flexible pavement analysis, rigid pavements (Westergaard), traffic loading and ESAs, mechanistic-empirical design, deflection analysis and backcalculation (FWD).

For every question: identify term and topic, flag prerequisite Term 1 concepts when answering Term 2 questions, state relevant formulas. Hints first, full solutions only on request.`
  },
  ground: {
    name: 'Water Engineering', code: 'ENCN442', badge: 'W', color: '#4cb2d4', bg: '#15303a',
    meta: 'Final exam (60%) — July resit week',
    examDate: '',
    quickActions: [
      { label: 'Course section overview', prompt: 'Map out the four sections of ENCN442, who teaches each, and the key topics covered' },
      { label: 'Groundwater fundamentals', prompt: 'Cover the key groundwater theory: recharge, discharge, drawdown, well hydraulics, safe yield' },
      { label: 'Surface water modelling', prompt: 'Explain rainfall-runoff and hydrologic modelling approaches covered in this course' },
      { label: 'Coastal processes', prompt: 'Explain wave dynamics, tides, sediment transport and sea level rise impacts' },
      { label: 'Infrastructure design', prompt: 'Cover surface water infrastructure: culverts, bridges, channels, drop structures' }
    ],
    assessments: [
      { name: 'Groundwater (MODFLOW)', weight: 10, key: 'gw' },
      { name: 'Surface Water Modelling (HEC-HMS)', weight: 10, key: 'swm' },
      { name: 'Coastal Engineering', weight: 10, key: 'ce' },
      { name: 'Surface Water Infrastructure', weight: 10, key: 'swi' },
      { name: 'Final Exam (upcoming)', weight: 60, key: 'exam', isExam: true }
    ],
    defaultGrades: { gw: '0', swm: '91' },
    passNote: 'Coastal Engineering grade pending — Research Project 81.3% + Design Project 90% submitted.',
    systemPrompt: `You are a tutor for ENCN442 (Surface Water, Groundwater and Coastal Engineering) at University of Canterbury. The final exam covers all four sections.

1. GROUNDWATER — recharge/discharge, well hydraulics, drawdown, safe yield, MODFLOW.
2. SURFACEWATER — rainfall-runoff, catchment characteristics, climate change impacts, HEC-HMS.
3. COASTAL — surface waves, wave modelling, tides, sediment transport, sea level rise. Coastal section in the 2026 exam is only ~35 minutes, expect fewer/smaller questions. For wave height analysis, use 1.67·Hs for the 1/100 wave height (Rayleigh distribution).
4. SURFACEWATER INFRASTRUCTURE — earth channels, culverts, drop structures. Equations provided with exam — know how to apply them, not memorise them.

For each question: identify which section, cite specific lecture content, hints first, full solutions when asked.`
  }
};

// ============ STATE ============
const KEY = 'study_tutor_';
let model = localStorage.getItem(KEY+'model') || 'google/gemini-2.5-flash';

const BASE_PROMPT = `CRITICAL RULES:
1. SOURCE-GROUNDED ONLY. Answers must come from uploaded lecture notes and tutorial solutions. Do not introduce theory or formulas not in the materials.
2. CITE EVERYTHING. When stating a rule, formula, or step, cite the document and location.
3. USE THE LECTURER'S APPROACH. Follow the method in provided solutions — use the lecturer's notation and sign conventions.
4. ADMIT GAPS EXPLICITLY. If a topic isn't in the loaded materials, say so. Do not fall back to general knowledge.
5. HINTS FIRST. Give hints before full solutions unless the student explicitly asks for the full answer.

---

`;

let state = {};
for (const k of Object.keys(COURSES)) {
  const storedGrades = localStorage.getItem(KEY+k+'_grades');
  state[k] = {
    history: JSON.parse(localStorage.getItem(KEY+k+'_hist') || '[]'),
    files: {},
    selectedSessions: new Set(),
    grades: storedGrades ? JSON.parse(storedGrades) : (COURSES[k].defaultGrades || {})
  };
  if (!storedGrades && COURSES[k].defaultGrades) {
    localStorage.setItem(KEY+k+'_grades', JSON.stringify(COURSES[k].defaultGrades));
  }
}

// ============ NAV ============
document.querySelectorAll('nav button[data-tab]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('nav button[data-tab]').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const tab = b.dataset.tab;
    document.getElementById('tab-'+tab).classList.add('active');
    if (tab === 'dash') renderDash();
  });
});

// ============ COURSE RENDER ============
function renderCourse(key) {
  const c = COURSES[key];
  const sessions = SESSIONS[key] || [];
  const tab = document.getElementById('tab-'+key);

  // Group sessions into columns of ~3
  const cols = [];
  for (let i = 0; i < sessions.length; i += 3) {
    cols.push(sessions.slice(i, i + 3));
  }

  tab.innerHTML = `
    <div class="course-header" style="--course-color:${c.color}">
      <div class="course-badge" style="background:${c.color}">${c.badge}</div>
      <div>
        <h1>${c.code} — ${c.name}</h1>
        <div class="meta">${c.meta} · <span id="${key}-fc">No notes loaded</span></div>
      </div>
      <button class="clear" onclick="clearHistory('${key}')">Clear chat</button>
    </div>
    <div class="session-panel" style="--course-color:${c.color}" id="${key}-session-panel">
      ${cols.map(col => `
        <div class="session-col">
          <div class="session-col-label">Select sessions</div>
          ${col.map(s => `
            <button class="session-btn" id="${key}-sess-${s.id}" onclick="toggleSession('${key}','${s.id}')">
              <span class="sb-check">✓</span>
              <span>${s.label}</span>
              <span class="sb-count">${s.files.length}f</span>
            </button>
          `).join('')}
        </div>
      `).join('')}
      <div class="session-actions">
        <button class="load-btn" id="${key}-load-btn" style="background:${c.color}" onclick="loadSelectedSessions('${key}')">Load selected</button>
        <div class="load-status" id="${key}-load-status"></div>
      </div>
    </div>
    <div class="chat-area" id="${key}-chat"></div>
    <div class="quick-btns" id="${key}-quick">
      ${c.quickActions.map(a => `<button class="quick-btn ${a.special?'special':''}" onclick='quickSend("${key}", ${JSON.stringify(a.prompt)})'>${a.label}</button>`).join('')}
    </div>
    <div class="input-area">
      <textarea id="${key}-input" placeholder="Ask a question about ${c.code}..." rows="1" onkeydown="handleKey(event,'${key}')" oninput="autoResize(this)"></textarea>
      <button class="send-btn" onclick="sendMessage('${key}')">↑</button>
    </div>
  `;
  renderChat(key);
  updateLoadStatus(key);
}

function toggleSession(key, sessionId) {
  const s = state[key].selectedSessions;
  if (s.has(sessionId)) s.delete(sessionId);
  else s.add(sessionId);
  const btn = document.getElementById(`${key}-sess-${sessionId}`);
  if (btn) btn.classList.toggle('selected', s.has(sessionId));
}

async function loadSelectedSessions(key) {
  const sessions = SESSIONS[key] || [];
  const selected = sessions.filter(s => state[key].selectedSessions.has(s.id));
  if (selected.length === 0) {
    setLoadStatus(key, 'Select at least one session', false);
    return;
  }

  const allFiles = [...new Set(selected.flatMap(s => s.files))];
  const loadBtn = document.getElementById(key+'-load-btn');
  loadBtn.disabled = true;
  setLoadStatus(key, 'Loading…', null);

  // Clear existing files
  state[key].files = {};

  let loaded = 0;
  for (const filename of allFiles) {
    try {
      setLoadStatus(key, `Loading ${loaded+1}/${allFiles.length}…`, null);
      const pathEncoded = filename.split('/').map(encodeURIComponent).join('/');
      const resp = await fetch(`notes/${key}/${pathEncoded}`);
      if (!resp.ok) { console.warn(`404: ${filename}`); continue; }
      const blob = await resp.blob();
      const b64 = await blobToBase64(blob);
      state[key].files[filename] = b64;
      loaded++;
    } catch(err) {
      console.warn(`Failed: ${filename}`, err);
    }
  }

  loadBtn.disabled = false;
  updateLoadStatus(key);

  if (loaded === 0) {
    setLoadStatus(key, 'No files found — check paths', false);
  } else {
    setLoadStatus(key, `${loaded} file${loaded>1?'s':''} ready`, true);
    // Reset history so next message sends files fresh
    state[key].history = state[key].history.filter(m => typeof m.content === 'string');
  }
}

function setLoadStatus(key, msg, ok) {
  const el = document.getElementById(key+'-load-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'load-status' + (ok === true ? ' ok' : ok === false ? ' err' : '');
}

function updateLoadStatus(key) {
  const count = Object.keys(state[key].files).length;
  const fc = document.getElementById(key+'-fc');
  if (fc) fc.textContent = count ? `${count} file${count>1?'s':''} loaded` : 'No notes loaded';
}

// ============ CHAT ============
function renderChat(key) {
  const chat = document.getElementById(key+'-chat');
  if (!chat) return;
  chat.innerHTML = '';
  const c = COURSES[key];
  if (state[key].history.length === 0) {
    addMsgEl(key, 'assistant', `Hi! I'm your ${c.code} tutor.\n\nSelect one or more sessions from the panel above and hit "Load selected" — then ask anything. I'll only reference your loaded notes.`);
  } else {
    state[key].history.forEach(m => addMsgEl(key, m.role, typeof m.content === 'string' ? m.content : m.content.find(b => b.type==='text')?.text || ''));
  }
}

function addMsgEl(key, role, text) {
  const c = COURSES[key];
  const chat = document.getElementById(key+'-chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'avatar';
  av.style.background = role === 'user' ? '' : c.color;
  av.textContent = role === 'user' ? 'Z' : c.badge;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;
  div.appendChild(av);
  div.appendChild(bub);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return bub;
}

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function handleKey(e, key) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(key); } }
function quickSend(key, text) { document.getElementById(key+'-input').value = text; sendMessage(key); }
function clearHistory(key) {
  if (!confirm('Clear chat history?')) return;
  state[key].history = [];
  localStorage.removeItem(KEY+key+'_hist');
  renderChat(key);
}

async function sendMessage(key) {
  const input = document.getElementById(key+'-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  addMsgEl(key, 'user', text);

  const fileNames = Object.keys(state[key].files);
  const hasFiles = fileNames.length > 0;
  const alreadySentFiles = state[key].history.some(m => Array.isArray(m.content));

  let userContent;
  if (hasFiles && !alreadySentFiles) {
    userContent = [
      ...fileNames.map(name => ({
        type: 'image_url',
        image_url: { url: `data:application/pdf;base64,${state[key].files[name]}` }
      })),
      { type: 'text', text }
    ];
  } else {
    userContent = text;
  }

  state[key].history.push({ role: 'user', content: userContent });
  const thinkBubble = addMsgEl(key, 'assistant', 'Thinking…');
  thinkBubble.classList.add('thinking');

  try {
    const messages = [
      { role: 'system', content: BASE_PROMPT + COURSES[key].systemPrompt },
      ...state[key].history
    ];
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, max_tokens: 2000, messages })
    });
    const data = await resp.json();
    if (data.error) throw new Error(typeof data.error === 'string' ? data.error : data.error.message || JSON.stringify(data.error));
    const reply = data.choices[0].message.content;
    thinkBubble.classList.remove('thinking');
    thinkBubble.textContent = reply;
    state[key].history.push({ role: 'assistant', content: reply });
    saveHistory(key);
    updateLoadStatus(key);
  } catch (err) {
    thinkBubble.classList.remove('thinking');
    thinkBubble.textContent = `Error: ${err.message}`;
    thinkBubble.style.color = '#f87171';
    state[key].history.pop();
  }
}

function saveHistory(key) {
  const trimmed = state[key].history.map(m => {
    if (typeof m.content === 'string') return m;
    return { role: m.role, content: m.content.filter(b => b.type === 'text') };
  });
  try { localStorage.setItem(KEY+key+'_hist', JSON.stringify(trimmed)); } catch(e) { console.warn('History too large'); }
}

// ============ FILE UTILS ============
function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onloadend = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(blob);
  });
}

// ============ SETTINGS ============
function showSettings() {
  const m = prompt('Model (current: '+model+')\nCommon options:\ngoogle/gemini-2.5-flash\ngoogle/gemini-2.5-pro\nanthropic/claude-sonnet-4-5', model);
  if (m && m.trim()) { model = m.trim(); localStorage.setItem(KEY+'model', model); alert('Model updated to: '+model); }
}

// ============ DASHBOARD ============
function renderCountdown() {
  const grid = document.getElementById('countdown-grid');
  if (!grid) return;
  grid.innerHTML = '';
  const now = new Date();
  for (const k of Object.keys(COURSES)) {
    const c = COURSES[k];
    const savedDate = localStorage.getItem(KEY+k+'_examDate') || c.examDate;
    const card = document.createElement('div');
    card.className = 'countdown-card';
    card.style.borderLeftColor = c.color;
    card.onclick = () => editExamDate(k);
    if (!savedDate) {
      card.innerHTML = `<div class="cd-edit">edit</div><div class="cd-course">${c.code}</div><div class="cd-time" style="color:#666;font-size:17px">No date set</div><div class="cd-units">click to set</div>`;
    } else {
      const exam = new Date(savedDate);
      const diff = exam - now;
      if (diff < 0) {
        card.className += ' passed';
        card.innerHTML = `<div class="cd-edit">edit</div><div class="cd-course">${c.code}</div><div class="cd-time" style="font-size:17px">Passed</div><div class="cd-units">${exam.toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short'})}</div>`;
      } else {
        const days = Math.floor(diff/86400000);
        const hours = Math.floor((diff%86400000)/3600000);
        const mins = Math.floor((diff%3600000)/60000);
        if (days < 1) card.className += ' critical';
        else if (days < 3) card.className += ' urgent';
        let timeStr, unitStr;
        if (days >= 1) {
          timeStr = `${days}d ${hours}h`;
          unitStr = exam.toLocaleDateString('en-NZ',{weekday:'long',day:'numeric',month:'short'})+' · '+exam.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
        } else {
          timeStr = `${hours}h ${mins}m`;
          unitStr = 'Today · '+exam.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
        }
        card.innerHTML = `<div class="cd-edit">edit</div><div class="cd-course">${c.code}</div><div class="cd-time">${timeStr}</div><div class="cd-units">${unitStr}</div>`;
      }
    }
    grid.appendChild(card);
  }
}

function editExamDate(k) {
  const c = COURSES[k];
  const current = localStorage.getItem(KEY+k+'_examDate') || c.examDate;
  const dateStr = current ? new Date(current).toISOString().slice(0,16) : '';
  const input = prompt(`${c.code} exam date & time (YYYY-MM-DDTHH:MM):\nEnter "clear" to remove.`, dateStr);
  if (input === null) return;
  if (input.trim() === 'clear' || input.trim() === '') localStorage.removeItem(KEY+k+'_examDate');
  else { const t = new Date(input); if (isNaN(t.getTime())) { alert('Invalid format'); return; } localStorage.setItem(KEY+k+'_examDate', input); }
  renderCountdown();
}

function renderDash() {
  renderCountdown();
  const grid = document.getElementById('dash-grid');
  grid.innerHTML = '';
  for (const k of Object.keys(COURSES)) {
    const c = COURSES[k];
    const g = state[k].grades;
    const completed = c.assessments.filter(a => g[a.key] !== undefined && g[a.key] !== '');
    const remaining = c.assessments.filter(a => g[a.key] === undefined || g[a.key] === '');
    const earned = completed.reduce((s,a) => s + (parseFloat(g[a.key])/100)*a.weight, 0);
    const remainWeight = remaining.reduce((s,a) => s + a.weight, 0);
    const exam = c.assessments.find(a => a.isExam);
    const examPending = exam && (g[exam.key] === undefined || g[exam.key] === '');
    let passCallout = '';
    if (examPending) {
      const needOnExam = Math.max(0, ((50-earned)/exam.weight)*100);
      const examName = exam.name.replace(' (upcoming)','').replace(' — upcoming','');
      const displayNeed = needOnExam <= 0 ? `Already secured a pass — exam is a bonus` : `${needOnExam.toFixed(1)}% on ${examName} to pass`;
      passCallout = `<div class="pass-callout"><div class="pc-value">${displayNeed}</div></div>`;
    } else if (remainWeight === 0) {
      passCallout = `<div class="pass-callout"><div class="pc-value">Final grade: ${earned.toFixed(1)}%</div></div>`;
    }
    const targets = [60,65,70]; const targetLabels = ['B','B+','A-'];
    const card = document.createElement('div');
    card.className = 'course-card';
    card.style.borderLeftColor = c.color;
    card.innerHTML = `
      <div class="cc-header">
        <div class="cc-badge" style="background:${c.color}">${c.badge}</div>
        <div><div class="cc-name">${c.code} — ${c.name}</div><div class="cc-meta">${c.meta}</div></div>
      </div>
      ${passCallout}
      <div class="grade-table">
        ${c.assessments.map(a => {
          const v = g[a.key] !== undefined ? g[a.key] : '';
          return `<div class="grade-row"><span class="gr-name">${a.name}</span><input type="number" min="0" max="100" step="0.01" placeholder="—" value="${v}" class="${v===''?'empty':''}" oninput="updateGrade('${k}','${a.key}',this.value)" /><span class="gr-weight">${a.weight}%</span></div>`;
        }).join('')}
      </div>
      ${c.passNote ? `<div class="note-line">Note: ${c.passNote}</div>` : ''}
      <div class="current-stats">
        <div class="stat-line"><div class="sl-label">Current</div><div class="sl-value">${completed.length>0?earned.toFixed(1)+'%':'—'}</div></div>
        <div class="stat-line"><div class="sl-label">Remaining weight</div><div class="sl-value">${remainWeight}%</div></div>
      </div>
      ${remainWeight > 0 && examPending ? `<div class="higher-targets"><div class="ht-label">Need on remaining for higher grades</div>${targets.map((t,i)=>{const need=((t-earned)/remainWeight)*100;let cls='easy';if(need>100)cls='impossible';else if(need>80)cls='hard';else if(need>60)cls='medium';return`<div class="target-row"><span class="tr-name">${targetLabels[i]} (${t}%)</span><span class="tr-val ${cls}">${need<=0?'Already secured':need>100?'Not possible':need.toFixed(1)+'%'}</span></div>`;}).join('')}</div>` : ''}
    `;
    grid.appendChild(card);
  }
}

function updateGrade(courseKey, assessKey, val) {
  if (val === '' || val === null) delete state[courseKey].grades[assessKey];
  else state[courseKey].grades[assessKey] = val;
  localStorage.setItem(KEY+courseKey+'_grades', JSON.stringify(state[courseKey].grades));
  setTimeout(renderDash, 0);
}

// ============ INIT ============
for (const k of Object.keys(COURSES)) renderCourse(k);
renderDash();
setInterval(renderCountdown, 60000);
</script>
